<div class="join-room-container">
    <div class="join-room-card">
        <h1><i class="fas fa-door-open"></i> Unirse a una Sala</h1>
        
        <div class="join-options">
            <div class="join-option active" data-tab="code">
                <i class="fas fa-key"></i>
                <span>Código</span>
            </div>
            <div class="join-option" data-tab="link">
                <i class="fas fa-link"></i>
                <span>Enlace</span>
            </div>
        </div>

        <form id="joinByCodeForm" class="join-form">
            <div class="form-group">
                <label for="roomCode">Código de sala</label>
                <input type="text" id="roomCode" name="roomCode" required maxlength="6" placeholder="ABC123" class="code-input">
            </div>
            <div class="form-group password-field hidden" id="passwordField">
                <label for="roomPassword">Contraseña</label>
                <input type="password" id="roomPassword" name="roomPassword" placeholder="Contraseña de la sala">
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Unirse
            </button>
        </form>

        <form id="joinByLinkForm" class="join-form hidden">
            <div class="form-group">
                <label for="roomLink">Enlace de la sala</label>
                <input type="url" id="roomLink" name="roomLink" required placeholder="https://watchparty.app/room/ABC123">
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Unirse
            </button>
        </form>

        <div class="qr-section">
            <h3>O escanea el código QR</h3>
            <div id="qrCode" class="qr-placeholder">
                <i class="fas fa-qrcode"></i>
            </div>
        </div>
    </div>
</div>
