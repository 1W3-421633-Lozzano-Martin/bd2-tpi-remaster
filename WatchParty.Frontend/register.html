<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-user-plus"></i>
            <h1>Crear Cuenta</h1>
            <p>Únete a WatchParty</p>
        </div>
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" name="username" required minlength="3" placeholder="usuario123">
            </div>
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" required placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="Mínimo 6 caracteres">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirmar contraseña</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repite la contraseña">
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-user-plus"></i> Crear Cuenta
            </button>
        </form>
        <div class="auth-footer">
            <p>¿Ya tienes cuenta? <a href="/login" data-link>Inicia sesión</a></p>
        </div>
    </div>
</div>
