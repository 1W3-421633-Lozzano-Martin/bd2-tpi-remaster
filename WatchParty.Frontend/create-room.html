<div class="create-room-container">
    <div class="create-room-card">
        <h1><i class="fas fa-plus-circle"></i> Crear Nueva Sala</h1>
        <form id="createRoomForm">
            <div class="form-group">
                <label for="roomName">Nombre de la sala</label>
                <input type="text" id="roomName" name="roomName" required placeholder="Noche de películas">
            </div>
            
            <div class="form-group">
                <label for="videoUrl">URL del video (opcional)</label>
                <input type="url" id="videoUrl" name="videoUrl" placeholder="https://example.com/video.mp4">
                <small>Puedes añadir el video después si lo prefieres</small>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="isPrivate" name="isPrivate">
                    Sala privada (requiere contraseña)
                </label>
            </div>

            <div class="form-group private-options hidden" id="privateOptions">
                <label for="roomPassword">Contraseña</label>
                <input type="password" id="roomPassword" name="roomPassword" placeholder="Contraseña para la sala">
            </div>

            <div class="form-group">
                <label for="maxViewers">Máximo de espectadores</label>
                <select id="maxViewers" name="maxViewers">
                    <option value="10">10 personas</option>
                    <option value="25">25 personas</option>
                    <option value="50" selected>50 personas</option>
                    <option value="100">100 personas</option>
                </select>
            </div>

            <div class="form-actions">
                <a href="/" class="btn btn-outline" data-link>Cancelar</a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Crear Sala
                </button>
            </div>
        </form>
    </div>
</div>
