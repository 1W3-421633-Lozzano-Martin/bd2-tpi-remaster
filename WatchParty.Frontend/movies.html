<div class="movies-container">
    <div class="movies-header">
        <h1><i class="fas fa-film"></i> Películas</h1>
        <div class="movies-actions">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar películas...">
            </div>
            <button class="btn btn-primary" id="addMovieBtn">
                <i class="fas fa-plus"></i> Añadir Película
            </button>
        </div>
    </div>

    <div class="movies-grid" id="moviesGrid">
        <div class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <span>Cargando películas...</span>
        </div>
    </div>

    <div class="pagination" id="pagination"></div>
</div>

<div class="add-movie-modal hidden" id="addMovieModal">
    <div class="modal-content">
        <h3><i class="fas fa-plus"></i> Añadir Película</h3>
        <form id="addMovieForm">
            <div class="form-group">
                <label for="movieTitle">Título</label>
                <input type="text" id="movieTitle" name="title" required>
            </div>
            <div class="form-group">
                <label for="movieDescription">Descripción</label>
                <textarea id="movieDescription" name="description" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label for="movieUrl">URL del Video</label>
                <input type="url" id="movieUrl" name="videoUrl" required placeholder="https://...">
            </div>
            <div class="form-group">
                <label for="movieThumbnail">URL de Miniatura</label>
                <input type="url" id="movieThumbnail" name="thumbnail" placeholder="https://...">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="movieDuration">Duración (minutos)</label>
                    <input type="number" id="movieDuration" name="duration" min="1">
                </div>
                <div class="form-group">
                    <label for="movieYear">Año</label>
                    <input type="number" id="movieYear" name="year" min="1900" max="2030">
                </div>
            </div>
            <div class="form-group">
                <label for="movieGenre">Género</label>
                <select id="movieGenre" name="genre">
                    <option value="">Seleccionar...</option>
                    <option value="Acción">Acción</option>
                    <option value="Comedia">Comedia</option>
                    <option value="Drama">Drama</option>
                    <option value="Terror">Terror</option>
                    <option value="Ciencia Ficción">Ciencia Ficción</option>
                    <option value="Romance">Romance</option>
                    <option value="Animación">Animación</option>
                    <option value="Documental">Documental</option>
                </select>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-outline" id="cancelAddMovie">Cancelar</button>
                <button type="submit" class="btn btn-primary">Añadir</button>
            </div>
        </form>
        <button class="modal-close" id="closeAddMovieModal">&times;</button>
    </div>
</div>
