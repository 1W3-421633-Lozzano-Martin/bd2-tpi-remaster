<div class="my-rooms-container">
    <div class="my-rooms-header">
        <h1><i class="fas fa-door-open"></i> Mis Salas</h1>
        <a href="/create-room" class="btn btn-primary" data-link>
            <i class="fas fa-plus"></i> Crear Nueva Sala
        </a>
    </div>

    <div class="rooms-list" id="myRoomsList">
        <div class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <span>Cargando salas...</span>
        </div>
    </div>

    <div class="empty-state hidden" id="emptyRooms">
        <i class="fas fa-film"></i>
        <h2>No tienes salas</h2>
        <p>Crea tu primera sala para ver películas con amigos.</p>
        <a href="/create-room" class="btn btn-primary" data-link>
            <i class="fas fa-plus"></i> Crear Sala
        </a>
    </div>
</div>
